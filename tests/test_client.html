<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia Lai Travel - AI Assistant Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { height: calc(100vh - 180px); }
        .message-enter { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div class="max-w-2xl mx-auto mt-8 bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
        <!-- Header -->
        <div class="bg-emerald-600 px-6 py-4 flex justify-between items-center">
            <h1 class="text-white text-xl font-bold">Gia Lai Travel AI</h1>
            <div id="status" class="flex items-center text-emerald-100 text-sm">
                <div class="w-2 h-2 bg-yellow-400 rounded-full mr-2 animate-pulse"></div>
                Connecting...
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chatBox" class="chat-container overflow-y-auto p-6 space-y-4 bg-gray-50 relative">
            <!-- Initial Welcome Screen -->
            <div id="welcomeScreen" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-50 z-10 message-enter space-y-4">
                <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mb-2 shadow-sm">
                    <span class="text-4xl">🏕️</span>
                </div>
                <h2 class="text-2xl font-bold text-emerald-800 text-center">Gia Lai Travel AI</h2>
                <p class="text-gray-500 text-center max-w-sm px-4">Trợ lý AI thiết kế lịch trình du lịch cá nhân hoá riêng cho bạn chỉ trong 30 giây.</p>
                <button onclick="startAIChat()" class="mt-6 bg-emerald-600 text-white px-8 py-3 rounded-full font-semibold shadow-md hover:bg-emerald-700 hover:shadow-lg transition-all transform hover:-translate-y-0.5">
                    Bắt đầu tạo lịch trình với AI
                </button>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-white border-t border-gray-200">
            <div class="flex space-x-2">
                <input type="text" id="messageInput" disabled
                    class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 disabled:bg-gray-100 disabled:cursor-not-allowed"
                    placeholder="Nhập câu trả lời của bạn..."
                    onkeypress="if(event.key === 'Enter') sendMessage()">
                <button id="sendBtn" disabled
                    class="bg-emerald-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-emerald-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
                    onclick="sendMessage()">
                    Gửi
                </button>
            </div>
        </div>
    </div>

    <script>
        const session_id = "test-session-" + Math.floor(Math.random() * 10000);
        let ws = null;
        const chatBox = document.getElementById('chatBox');
        const statusEl = document.getElementById('status');
        const inputEl = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        function connect() {
            // Append session_id to URL as the backend accepts it as query param
            ws = new WebSocket(`ws://localhost:8000/ws/chat?session_id=${session_id}`);

            ws.onopen = () => {
                statusEl.innerHTML = '<div class="w-2 h-2 bg-green-400 rounded-full mr-2"></div>Connected';
                inputEl.disabled = false;
                sendBtn.disabled = false;
                appendSystemMessage("Đã kết nối thành công tới WebSocket! Vui lòng điền form bên dưới để bắt đầu.");
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleIncomingMessage(data);
                } catch (e) {
                    console.error("Lỗi parse JSON", e);
                }
            };

            ws.onclose = () => {
                statusEl.innerHTML = '<div class="w-2 h-2 bg-red-400 rounded-full mr-2"></div>Disconnected';
                inputEl.disabled = true;
                sendBtn.disabled = true;
                appendSystemMessage("Mất kết nối. Vui lòng tải lại trang.");
            };
        }

        function handleIncomingMessage(data) {
            if (data.agent_message) {
                appendAgentMessage(data.agent_message);
            }
            
            // If there's an itinerary, show a summary
            if (data.itinerary && data.itinerary.days) {
                let html = `<div class="mt-2 p-4 bg-white border border-emerald-200 rounded-xl shadow-sm">`;
                html += `<h4 class="font-bold text-lg text-emerald-800 mb-3 border-b pb-2">Lịch trình đề xuất của bạn</h4>`;
                
                data.itinerary.days.forEach(d => {
                    html += `<div class="mt-4">`;
                    html += `<div class="font-bold text-emerald-700 text-md bg-emerald-50 inline-block px-3 py-1 rounded-md">Ngày ${d.day}: ${d.title}</div>`;
                    html += `<div class="text-xs text-gray-500 mt-1 mb-2 pl-1">Khoảng cách di chuyển: ${d.total_km} km</div>`;
                    
                    html += `<div class="pl-2 border-l-2 border-emerald-100 space-y-3 mt-2">`;
                    if (d.activities && d.activities.length > 0) {
                        d.activities.forEach(act => {
                            html += `<div class="relative pl-4">`;
                            html += `<div class="absolute w-2 h-2 bg-emerald-400 rounded-full -left-[5px] top-1.5"></div>`;
                            html += `<div class="font-semibold text-gray-800">${act.time_slot} - ${act.poi_name}</div>`;
                            html += `<div class="text-sm text-gray-600 mt-1"><span class="font-medium">Hoạt động:</span> ${act.note}</div>`;
                            html += `<div class="flex flex-wrap gap-2 mt-1.5">`;
                            if (act.cost > 0) html += `<span class="text-xs bg-orange-100 text-orange-700 px-2 py-0.5 rounded font-medium">💰 ${act.cost.toLocaleString('vi-VN')}đ</span>`;
                            if (act.distance_from_prev_km > 0) html += `<span class="text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded font-medium">🚗 ${act.distance_from_prev_km} km</span>`;
                            html += `<span class="text-xs bg-gray-100 text-gray-700 px-2 py-0.5 rounded font-medium">⏱️ ${act.duration_minutes} phút</span>`;
                            html += `</div>`;
                            html += `</div>`;
                        });
                    }
                    html += `</div></div>`;
                });
                
                html += `<div class="mt-5 border-t pt-3 flex flex-col sm:flex-row justify-between items-start sm:items-center bg-gray-50 p-3 rounded-lg gap-2">`;
                html += `<div class="text-sm"><span class="font-medium text-gray-600">Tổng quãng đường:</span> <span class="font-bold text-emerald-600">${data.itinerary.total_km} km</span></div>`;
                html += `<div class="text-sm"><span class="font-medium text-gray-600">Tổng dự kiến:</span> <span class="font-bold text-orange-600">${(data.itinerary.total_cost || 0).toLocaleString('vi-VN')} VND</span></div>`;
                html += `</div>`;
                
                html += `</div>`;
                appendCustomAgentHTML(html);
            }

            if (data.type === "realtime_info" && data.results && data.results.length > 0) {
                let html = `<div class="mt-2 p-4 bg-white border border-blue-200 rounded-xl shadow-sm">`;
                html += `<h4 class="font-bold text-lg text-blue-800 mb-3 border-b pb-2">Thông tin tìm kiếm được</h4>`;
                html += `<div class="space-y-3">`;
                
                data.results.forEach(res => {
                    html += `<div class="p-3 bg-blue-50 rounded-lg border border-blue-100">`;
                    if (res.url) {
                        html += `<a href="${res.url}" target="_blank" class="font-bold text-blue-700 hover:underline block text-sm mb-1">${res.title}</a>`;
                    } else {
                        html += `<div class="font-bold text-blue-700 block text-sm mb-1">${res.title}</div>`;
                    }
                    const text = res.content || res.description || "";
                    html += `<p class="text-xs text-gray-700">${text}</p>`;
                    html += `</div>`;
                });
                
                html += `</div></div>`;
                appendCustomAgentHTML(html);
            }

            if (data.ui_chips && data.ui_chips.length > 0) {
                renderChips(data.ui_chips);
            }

            if (data.allow_free_text) {
                renderFreeTextHint();
            }

            if (data.type === "cold_start_form") {
                renderColdStartForm();
            }
        }

        function renderColdStartForm() {
            removeChips();
            const formId = "coldStartForm";
            if (document.getElementById(formId)) return;

            let html = `
                <div id="${formId}" class="mt-3 p-4 bg-white border border-emerald-200 rounded-xl shadow-sm w-[95%] sm:w-[85%] message-enter">
                    <h4 class="font-bold text-emerald-800 mb-3 border-b pb-2">Thông tin chuyến đi</h4>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Chuyến đi của bạn?</label>
                            <select id="cs_duration" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-emerald-500 focus:border-emerald-500">
                                <option value="2 ngày 1 đêm">2 ngày 1 đêm</option>
                                <option value="3 ngày 2 đêm">3 ngày 2 đêm</option>
                                <option value="4 ngày 3 đêm">4 ngày 3 đêm</option>
                                <option value="Dài hơn">Dài hơn</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nhóm đồng hành?</label>
                            <select id="cs_group" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-emerald-500 focus:border-emerald-500">
                                <option value="Một mình">Một mình</option>
                                <option value="Cặp đôi">Cặp đôi</option>
                                <option value="Nhóm bạn">Nhóm bạn</option>
                                <option value="Gia đình">Gia đình (có trẻ em / người cao tuổi)</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Di chuyển bằng gì?</label>
                            <select id="cs_transport" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-emerald-500 focus:border-emerald-500">
                                <option value="Xe máy tự lái">Xe máy tự lái</option>
                                <option value="Thuê ô tô">Thuê ô tô</option>
                                <option value="Chưa biết">Chưa biết</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mt-4 flex justify-end">
                        <button onclick="submitColdStartForm()" class="bg-emerald-600 text-white px-5 py-2 rounded-lg font-medium hover:bg-emerald-700 transition">
                            Xác nhận
                        </button>
                    </div>
                </div>
            `;
            chatBox.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        function submitColdStartForm() {
            const dur = document.getElementById("cs_duration").value;
            const grp = document.getElementById("cs_group").value;
            const trans = document.getElementById("cs_transport").value;
            const combinedMessage = `Thời gian: ${dur}. Nhóm: ${grp}. Di chuyển: ${trans}.`;
            
            // Remove the form from UI
            document.getElementById("coldStartForm").remove();
            
            // Send as regular message
            sendMessage(combinedMessage);
        }

        function sendMessage(text = null, chipValue = null) {
            const msg = text || inputEl.value.trim();
            if (!msg && !chipValue) return;

            // Render user message on screen
            appendUserMessage(msg || chipValue);

            // Send via WS
            const payload = {
                type: "user_message",
                session_id: session_id,
                payload: {
                    message: msg,
                    chip_value: chipValue
                }
            };
            ws.send(JSON.stringify(payload));
            
            inputEl.value = '';
            removeChips();
            removeFreeTextHint();
        }

        function sendChip(label, value) {
            sendMessage(label, value);
        }

        function appendUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'flex flex-col items-end message-enter';
            div.innerHTML = `
                <div class="bg-emerald-600 text-white rounded-2xl rounded-tr-none px-5 py-3 max-w-[85%] shadow-sm">
                    ${text}
                </div>
            `;
            chatBox.appendChild(div);
            scrollToBottom();
        }

        function appendAgentMessage(text) {
            const div = document.createElement('div');
            div.className = 'flex flex-col items-start message-enter';
            div.innerHTML = `
                <div class="bg-white text-gray-800 border border-gray-200 rounded-2xl rounded-tl-none px-5 py-3 max-w-[85%] shadow-sm whitespace-pre-line">
                    ${text}
                </div>
            `;
            chatBox.appendChild(div);
            scrollToBottom();
        }

        function appendCustomAgentHTML(html) {
            const div = document.createElement('div');
            div.className = 'flex flex-col items-start message-enter mt-1';
            div.innerHTML = `
                <div class="bg-white w-[85%]">
                    ${html}
                </div>
            `;
            chatBox.appendChild(div);
            scrollToBottom();
        }

        function appendSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'flex justify-center message-enter my-2';
            div.innerHTML = `
                <span class="bg-gray-200 text-gray-500 text-xs px-3 py-1 rounded-full">
                    ${text}
                </span>
            `;
            chatBox.appendChild(div);
            scrollToBottom();
        }

        function renderChips(chips) {
            removeChips(); // Remove old chips if any
            const div = document.createElement('div');
            div.id = 'active-chips';
            div.className = 'flex flex-wrap gap-2 mt-2 items-start message-enter';
            
            chips.forEach(chip => {
                const btn = document.createElement('button');
                btn.className = 'px-4 py-2 bg-white border border-emerald-500 text-emerald-600 rounded-full text-sm font-medium hover:bg-emerald-50 hover:shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-1';
                btn.innerText = chip.label;
                btn.onclick = () => sendChip(chip.label, chip.value);
                div.appendChild(btn);
            });
            chatBox.appendChild(div);
            scrollToBottom();
        }

        function removeChips() {
            const oldChips = document.getElementById('active-chips');
            if (oldChips) {
                oldChips.remove();
            }
        }

        function renderFreeTextHint() {
            removeFreeTextHint();
            inputEl.placeholder = "Nhập tự nhiên, ví dụ: thích trekking nhẹ, ăn đặc sản, ngắm cảnh...";

            const div = document.createElement('div');
            div.id = 'active-free-text-hint';
            div.className = 'text-xs text-gray-500 mt-1 ml-1 message-enter';
            div.innerText = 'Bạn cũng có thể bỏ qua các gợi ý và nhập mong muốn riêng ở ô chat.';
            chatBox.appendChild(div);
            inputEl.focus();
            scrollToBottom();
        }

        function removeFreeTextHint() {
            const oldHint = document.getElementById('active-free-text-hint');
            if (oldHint) {
                oldHint.remove();
            }
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function startAIChat() {
            const welcome = document.getElementById("welcomeScreen");
            if (welcome) {
                welcome.style.opacity = '0';
                welcome.style.transition = 'opacity 0.3s ease';
                setTimeout(() => welcome.remove(), 300);
            }
            
            appendAgentMessage("Đang kết nối tới máy chủ AI...");
            connect();
        }
    </script>
</body>
</html>
